version: "3.9"

services:
  gamble-bot:
    build:
      context: .
      dockerfile: Dockerfile
    image: gamble-bot:latest
    restart: unless-stopped
    environment:
      - NODE_ENV=production
      - DISCORD_TOKEN=${DISCORD_TOKEN}
      - APPLICATION_ID=${APPLICATION_ID}
      - PUBLIC_KEY=${PUBLIC_KEY}
    volumes:
      - /home/gamblebot/data:/app/data
    networks:
      - bot-net

networks:
  bot-net:
    driver: bridge
